    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- gitlawb:social-meta:start -->

    <link rel="canonical" href="https://explorer.gitlawb.com/" />

    <meta property="og:site_name" content="gitlawb explorer" />
    <meta property="og:title" content="gitlawb explorer" />
    <meta property="og:description" content="Browse live repositories on the gitlawb network — clone over gitlawb://, inspect ownership, and verify push certificates." />
    <meta property="og:url" content="https://explorer.gitlawb.com/" />
    <meta property="og:image" content="https://explorer.gitlawb.com/og.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="gitlawb explorer" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <!-- Anti-FOUC: set theme class before first paint. Dark is the default theme. -->
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        var dark = t ? t === 'dark' : true;
        document.documentElement.classList.toggle('dark', dark);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
